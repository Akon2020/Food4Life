name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    # Build "production-like" : les mocks sont désactivés en prod (voir lib/api/client.ts),
    # le build n'a pas besoin du backend (données client-side + sitemap avec fallback).
    env:
      NEXT_PUBLIC_SITE_URL: "https://foodforlifedrc.org"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
